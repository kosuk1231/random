<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>마주보고톡톡 랜덤 추첨기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --teal-deep:#0a6e75;
    --teal:#008b92;
    --teal-bright:#00a8a8;
    --lime:#aacd06;
    --lime-deep:#7fa300;
    --ci-gray:#c0c0c0;

    --bg:#0c1d1f;
    --bg-soft:#12292b;
    --card:#153033;
    --card-2:#1a393c;
    --border:rgba(0,168,168,.16);
    --text:#e9f2f1;
    --text-dim:#8bb0af;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(circle at 50% -10%, #12343200 0%, var(--bg) 60%), var(--bg);
    color:var(--text);
    font-family:'Noto Sans KR',sans-serif;
    min-height:100vh; position:relative; overflow-x:hidden;
  }
  button{font-family:inherit;}
  :focus-visible{outline:2px solid var(--lime); outline-offset:3px; border-radius:6px;}

  #ambient{position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0;}
  #ambient span{position:absolute; border-radius:50%; opacity:.5; animation:float 9s ease-in-out infinite alternate;}
  @keyframes float{from{transform:translateY(0) translateX(0);} to{transform:translateY(-24px) translateX(10px);}}

  #app{position:relative; z-index:1; max-width:560px; margin:0 auto; padding:28px 20px 60px;}

  header{text-align:center; padding:8px 4px 28px;}
  .logo-badge{
    width:52px; height:52px; margin:0 auto 12px; border-radius:50%;
    background:#fff; border:3px solid var(--teal);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 20px rgba(0,139,146,.35);
  }
  .logo-badge .u{position:relative; width:24px; height:20px;}
  .logo-badge .u:before{content:""; position:absolute; inset:0; border:4px solid var(--teal); border-top:none; border-radius:0 0 9px 9px;}
  .logo-badge .u:after{content:""; position:absolute; top:5px; left:50%; transform:translateX(-50%); width:8px; height:8px; border-radius:50%; background:var(--lime);}
  header h1{
    font-family:'Jua',sans-serif; font-weight:400; font-size:clamp(26px,6vw,36px); letter-spacing:-.5px;
    background:linear-gradient(90deg, var(--teal-bright), var(--teal) 42%, var(--lime));
    -webkit-background-clip:text; background-clip:text; color:transparent; margin:0;
  }
  header p{margin:8px 0 0; font-size:13.5px; color:var(--text-dim);}

  .card{background:var(--card); border:1px solid var(--border); border-radius:22px; padding:24px; box-shadow:0 24px 60px rgba(0,0,0,.35);}
  .card + .card{margin-top:16px;}

  label.field-label{display:block; font-size:13px; color:var(--text-dim); margin-bottom:10px; font-weight:500;}
  textarea{
    width:100%; min-height:120px; resize:vertical; background:var(--bg-soft);
    border:1px solid var(--border); border-radius:14px; color:var(--text);
    padding:14px 16px; font-size:14px; line-height:1.6; font-family:inherit;
  }
  textarea::placeholder{color:#5b7d7c;}

  .btn{border:none; border-radius:999px; cursor:pointer; font-weight:700; font-size:15px; padding:15px 20px; transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease; width:100%;}
  .btn:disabled{opacity:.35; cursor:not-allowed; box-shadow:none !important; transform:none !important;}
  .btn:not(:disabled):hover{transform:translateY(-2px);}
  .btn-primary{background:linear-gradient(90deg, var(--teal), var(--lime)); color:#06322f; box-shadow:0 12px 28px rgba(0,139,146,.35);}
  .btn-ghost{background:transparent; border:1px solid var(--border); color:var(--text); padding:10px 16px; font-size:13.5px; font-weight:500; width:auto;}
  .btn-ghost:not(:disabled):hover{border-color:var(--lime); color:var(--lime);}
  .btn-link{background:none; border:none; color:var(--text-dim); font-size:13px; text-decoration:underline; cursor:pointer; padding:4px; width:auto;}

  .helper-text{font-size:12.5px; color:var(--text-dim); margin-top:10px; text-align:center;}

  .row-between{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; flex-wrap:wrap;}
  .row-between h2{font-size:14px; margin:0; color:var(--text-dim); font-weight:500;}
  .row-actions{display:flex; gap:8px; flex-wrap:wrap;}

  .chip-wrap{display:flex; flex-wrap:wrap; gap:8px; min-height:36px; transition:filter .2s ease; max-height:220px; overflow-y:auto;}
  .chip-wrap.hidden-names{filter:blur(7px);}
  .chip{display:inline-flex; align-items:center; gap:6px; background:var(--bg-soft); border:1px solid var(--border); border-radius:999px; padding:7px 8px 7px 14px; font-size:13px; max-width:180px;}
  .chip span.name{white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .chip button{background:var(--card-2); border:none; color:var(--text-dim); width:20px; height:20px; border-radius:50%; font-size:12px; line-height:1; cursor:pointer; flex-shrink:0;}
  .chip button:hover{background:var(--teal); color:#fff;}
  .empty-hint{font-size:13px; color:var(--text-dim); padding:8px 2px;}

  /* draw screen */
  #wheel-screen{display:none;}
  .top-bar{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}

  /* SLOT MACHINE */
  .slot-outer{position:relative; margin:10px auto 20px; max-width:420px;}
  .slot-window{
    position:relative; height:300px; overflow:hidden; border-radius:22px;
    background:linear-gradient(180deg, #0e2325, #0a1a1c);
    border:1px solid var(--border);
    box-shadow:inset 0 0 40px rgba(0,0,0,.5), 0 20px 50px rgba(0,0,0,.4);
    -webkit-mask-image:linear-gradient(180deg, transparent 0%, #000 18%, #000 82%, transparent 100%);
    mask-image:linear-gradient(180deg, transparent 0%, #000 18%, #000 82%, transparent 100%);
  }
  #reel{position:absolute; top:0; left:0; right:0; will-change:transform;}
  .reel-item{
    height:60px; display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:700; color:var(--text);
    padding:0 18px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  /* center highlight band sits above the window */
  .slot-center{
    position:absolute; left:8px; right:8px; top:50%; height:60px; transform:translateY(-50%);
    border-top:2px solid var(--lime); border-bottom:2px solid var(--lime);
    background:linear-gradient(90deg, rgba(0,168,168,.10), rgba(170,205,6,.10));
    pointer-events:none; z-index:3; border-radius:6px;
  }
  .slot-center.pulse{animation:centerPulse .5s ease;}
  @keyframes centerPulse{0%{box-shadow:0 0 0 0 rgba(170,205,6,.5);} 100%{box-shadow:0 0 0 22px rgba(170,205,6,0);}}
  .slot-pointer{position:absolute; top:50%; transform:translateY(-50%); width:0; height:0; z-index:4;}
  .slot-pointer.left{left:-2px; border-top:9px solid transparent; border-bottom:9px solid transparent; border-left:14px solid var(--lime);}
  .slot-pointer.right{right:-2px; border-top:9px solid transparent; border-bottom:9px solid transparent; border-right:14px solid var(--lime);}

  .wait-count{text-align:center; font-size:13px; color:var(--text-dim); margin-bottom:16px;}
  .wait-count b{color:var(--text); font-weight:700;}

  .empty-state{text-align:center; padding:20px 6px;}
  .empty-state .dotcluster{display:flex; justify-content:center; gap:8px; margin-bottom:16px;}
  .empty-state .dotcluster i{width:12px; height:12px; border-radius:50%;}
  .empty-state .dotcluster i:nth-child(1){background:var(--teal-deep);}
  .empty-state .dotcluster i:nth-child(2){background:var(--teal);}
  .empty-state .dotcluster i:nth-child(3){background:var(--teal-bright);}
  .empty-state .dotcluster i:nth-child(4){background:var(--lime);}
  .empty-state h3{font-family:'Jua',sans-serif; font-weight:400; font-size:22px; margin:0 0 8px;}
  .empty-state p{color:var(--text-dim); font-size:13.5px; margin:0 0 20px;}

  .history-toggle{text-align:center; margin-top:6px;}
  #history-list{display:none; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:12px; max-height:180px; overflow-y:auto;}
  #history-list .chip{opacity:.6; max-width:140px;}

  #overlay{position:fixed; inset:0; z-index:50; display:none; align-items:center; justify-content:center; flex-direction:column; padding:28px; text-align:center; background:rgba(6,15,16,.94); backdrop-filter:blur(6px);}
  #confetti-layer{position:absolute; inset:0; overflow:hidden; pointer-events:none;}
  #confetti-layer i{position:absolute; top:-5%; border-radius:50%; animation:fall linear forwards;}
  @keyframes fall{from{transform:translateY(0) rotate(0deg); opacity:1;} to{transform:translateY(112vh) rotate(360deg); opacity:.85;}}
  .eyebrow{position:relative; font-size:14px; letter-spacing:.4px; color:var(--text-dim); margin-bottom:14px;}
  .winner-card{
    position:relative; background:var(--card); border:1px solid var(--border); border-radius:24px;
    padding:34px 28px; max-width:440px; width:100%;
    box-shadow:0 0 0 1px rgba(255,255,255,.02), 0 30px 70px rgba(0,0,0,.5), 0 0 60px -10px rgba(170,205,6,.4);
    animation:pop .5s cubic-bezier(.2,.9,.3,1.3);
  }
  @keyframes pop{from{transform:scale(.7); opacity:0;} to{transform:scale(1); opacity:1;}}
  .winner-name{
    font-family:'Jua',sans-serif; font-weight:400; font-size:clamp(30px,8vw,52px); line-height:1.25; word-break:break-word;
    background:linear-gradient(90deg, var(--teal-bright), var(--lime));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .congrats{position:relative; margin-top:14px; font-size:14px; color:var(--text-dim);}
  .overlay-actions{position:relative; display:flex; flex-direction:column; gap:10px; margin-top:26px; width:100%; max-width:340px;}

  @media (prefers-reduced-motion: reduce){
    #ambient span{animation:none;}
    .winner-card{animation:none;}
    #confetti-layer i{animation-duration:.01s !important;}
  }
</style>
</head>
<body>

<div id="ambient"></div>

<div id="app">
  <header>
    <div class="logo-badge" aria-hidden="true"><div class="u"></div></div>
    <h1>마주보고톡톡 랜덤 추첨기</h1>
    <p>이름을 담고, 버튼을 누르고, 오늘의 주인공을 뽑아보세요</p>
  </header>

  <section id="setup-screen">
    <div class="card">
      <label class="field-label" for="name-input">이름 입력 (줄바꿈 또는 쉼표로 구분)</label>
      <textarea id="name-input" placeholder="예) 김철수, 이영희, 박민수&#10;또는 한 줄에 한 명씩 입력하세요"></textarea>
      <button class="btn btn-primary" id="add-names-btn" style="margin-top:12px;">이름 추가하기</button>
    </div>

    <div class="card">
      <div class="row-between">
        <h2 id="participant-count">참가자 (총 0명)</h2>
        <div class="row-actions">
          <button class="btn btn-ghost" id="toggle-hide-btn">이름 가리기</button>
          <button class="btn btn-ghost" id="clear-all-btn">전체 삭제</button>
        </div>
      </div>
      <div class="chip-wrap" id="chip-wrap">
        <div class="empty-hint" id="empty-hint">아직 등록된 참가자가 없어요. 위에서 이름을 추가해 보세요.</div>
      </div>
    </div>

    <button class="btn btn-primary" id="start-draw-btn" style="margin-top:16px;" disabled>추첨 시작하기 →</button>
    <p class="helper-text" id="start-helper">최소 2명 이상 입력해야 추첨을 시작할 수 있어요</p>
  </section>

  <section id="wheel-screen">
    <div class="top-bar">
      <button class="btn-link" id="back-to-setup-btn">← 이름 다시 입력</button>
      <button class="btn btn-ghost" id="reset-pool-btn" style="display:none;">당첨자 초기화</button>
    </div>

    <div id="draw-live">
      <div class="slot-outer">
        <div class="slot-window">
          <div id="reel"></div>
        </div>
        <div class="slot-center" id="slot-center"></div>
        <div class="slot-pointer left"></div>
        <div class="slot-pointer right"></div>
      </div>
      <p class="wait-count"><b id="wait-count-num">0</b>명 대기 중</p>
      <button class="btn btn-primary" id="spin-btn">추첨하기</button>
    </div>

    <div id="empty-pool" class="card empty-state" style="display:none;">
      <div class="dotcluster"><i></i><i></i><i></i><i></i></div>
      <h3>모든 참가자를 다 뽑았어요!</h3>
      <p>당첨자를 초기화하면 처음부터 다시 뽑을 수 있어요.</p>
      <button class="btn btn-primary" id="empty-reset-btn">당첨자 초기화하기</button>
    </div>

    <div class="history-toggle">
      <button class="btn-link" id="history-toggle-btn" style="display:none;">지난 당첨자 보기</button>
      <div id="history-list"></div>
    </div>
  </section>
</div>

<div id="overlay">
  <div id="confetti-layer"></div>
  <p class="eyebrow">오늘의 주인공은 바로,</p>
  <div class="winner-card">
    <div class="winner-name" id="winner-name">이름</div>
    <p class="congrats">축하해요! 🎉</p>
  </div>
  <div class="overlay-actions">
    <button class="btn btn-primary" id="next-winner-btn">다음 사람 뽑기</button>
    <button class="btn-link" id="overlay-reset-btn">당첨자 초기화</button>
  </div>
</div>

<script>
(function(){
  var PALETTE = ['#0a7b82','#aacd06','#00a8a8','#7fa300'];
  var ITEM_H = 60;

  var names = [];
  var winners = [];
  var spinning = false;

  var $ = function(id){ return document.getElementById(id); };

  var nameInput = $('name-input');
  var chipWrap = $('chip-wrap');
  var participantCount = $('participant-count');
  var startBtn = $('start-draw-btn');
  var startHelper = $('start-helper');
  var toggleHideBtn = $('toggle-hide-btn');
  var namesHidden = false;

  (function initAmbient(){
    var wrap = $('ambient');
    for(var i=0;i<18;i++){
      var s = document.createElement('span');
      var size = 2 + Math.random()*4;
      s.style.width = size+'px'; s.style.height = size+'px';
      s.style.left = (Math.random()*100)+'%'; s.style.top = (Math.random()*100)+'%';
      s.style.background = PALETTE[i % PALETTE.length];
      s.style.animationDuration = (6+Math.random()*6)+'s';
      s.style.animationDelay = (Math.random()*4)+'s';
      s.style.opacity = (0.15 + Math.random()*0.35).toFixed(2);
      wrap.appendChild(s);
    }
  })();

  function shuffle(arr){
    var a = arr.slice();
    for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
    return a;
  }

  function parseInput(text){
    return text.split(/[\n,]+/).map(function(s){return s.trim();}).filter(function(s){return s.length>0;});
  }

  function renderChips(){
    chipWrap.innerHTML = '';
    if(names.length === 0){
      var hint = document.createElement('div');
      hint.className = 'empty-hint';
      hint.textContent = '아직 등록된 참가자가 없어요. 위에서 이름을 추가해 보세요.';
      chipWrap.appendChild(hint);
    } else {
      names.forEach(function(name, idx){
        var chip = document.createElement('div'); chip.className = 'chip';
        var span = document.createElement('span'); span.className = 'name'; span.textContent = name;
        var btn = document.createElement('button'); btn.textContent = '×'; btn.setAttribute('aria-label', name + ' 삭제');
        btn.addEventListener('click', function(){ names.splice(idx,1); renderChips(); });
        chip.appendChild(span); chip.appendChild(btn); chipWrap.appendChild(chip);
      });
    }
    if(namesHidden){ chipWrap.classList.add('hidden-names'); } else { chipWrap.classList.remove('hidden-names'); }
    participantCount.textContent = '참가자 (총 ' + names.length + '명)';
    var enough = names.length >= 2;
    startBtn.disabled = !enough;
    startHelper.style.display = enough ? 'none' : 'block';
  }

  $('add-names-btn').addEventListener('click', function(){
    var parsed = parseInput(nameInput.value);
    if(parsed.length === 0) return;
    names = names.concat(parsed);
    nameInput.value = '';
    renderChips();
  });

  toggleHideBtn.addEventListener('click', function(){
    namesHidden = !namesHidden;
    toggleHideBtn.textContent = namesHidden ? '이름 보이기' : '이름 가리기';
    renderChips();
  });

  $('clear-all-btn').addEventListener('click', function(){ names = []; renderChips(); });

  $('start-draw-btn').addEventListener('click', function(){
    if(names.length < 2) return;
    winners = [];
    $('setup-screen').style.display = 'none';
    $('wheel-screen').style.display = 'block';
    refreshDrawScreen();
  });

  $('back-to-setup-btn').addEventListener('click', function(){
    $('wheel-screen').style.display = 'none';
    $('setup-screen').style.display = 'block';
    renderChips();
  });

  function makeItem(name){
    var d = document.createElement('div');
    d.className = 'reel-item';
    d.textContent = name;
    return d;
  }

  /* 대기화면: 현재 풀에서 몇 개를 보여줘 슬롯 창을 채워둠 */
  function refreshDrawScreen(){
    var reel = $('reel');
    reel.style.transition = 'none';
    reel.style.transform = 'translateY(0)';
    reel.innerHTML = '';
    var n = names.length;
    if(n > 0){
      var preview = shuffle(names);
      while(preview.length < 6){ preview = preview.concat(shuffle(names)); }
      preview.slice(0,6).forEach(function(nm){ reel.appendChild(makeItem(nm)); });
      // 가운데 정렬되게 위로 살짝 이동 (2번째 아이템이 중앙 오도록)
      reel.style.transform = 'translateY(' + (-(2 - 2) * ITEM_H) + 'px)';
    }
    $('wait-count-num').textContent = n;
    $('draw-live').style.display = n>0 ? 'block' : 'none';
    $('empty-pool').style.display = n>0 ? 'none' : 'block';
    $('reset-pool-btn').style.display = winners.length>0 ? 'inline-block' : 'none';
    renderHistory();
  }

  function renderHistory(){
    var toggleBtn = $('history-toggle-btn');
    var list = $('history-list');
    if(winners.length === 0){ toggleBtn.style.display='none'; list.style.display='none'; list.innerHTML=''; return; }
    toggleBtn.style.display = 'inline-block';
    toggleBtn.textContent = (list.style.display === 'flex') ? '지난 당첨자 숨기기' : '지난 당첨자 보기 (' + winners.length + '명)';
    list.innerHTML = '';
    winners.forEach(function(w){
      var chip = document.createElement('div'); chip.className='chip';
      var span = document.createElement('span'); span.className='name'; span.textContent=w;
      chip.appendChild(span); list.appendChild(chip);
    });
  }

  $('history-toggle-btn').addEventListener('click', function(){
    var list = $('history-list');
    var showing = list.style.display === 'flex';
    list.style.display = showing ? 'none' : 'flex';
    renderHistory();
  });

  function resetPool(){
    names = names.concat(winners);
    winners = [];
    refreshDrawScreen();
  }
  $('reset-pool-btn').addEventListener('click', resetPool);
  $('empty-reset-btn').addEventListener('click', resetPool);
  $('overlay-reset-btn').addEventListener('click', function(){ hideOverlay(); resetPool(); });

  $('spin-btn').addEventListener('click', function(){
    if(spinning || names.length === 0) return;
    spinning = true;
    $('spin-btn').disabled = true;

    var pool = names.slice();
    var winnerIndex = Math.floor(Math.random() * pool.length);
    var winner = pool[winnerIndex];

    // 릴(스트립) 구성: 풀을 여러 번 섞어 이어붙임
    var reelNames = [];
    var loops = Math.max(6, Math.ceil(50 / pool.length));
    for(var L=0; L<loops; L++){ reelNames = reelNames.concat(shuffle(pool)); }
    var centerRow = 2; // 창에 5줄 보이고 가운데(3번째)에 당첨자
    var winnerPos = reelNames.length;      // 당첨자 위치
    reelNames.push(winner);
    for(var p=0; p<4; p++){ reelNames.push(pool[Math.floor(Math.random()*pool.length)]); } // 아래 여백

    var reel = $('reel');
    reel.style.transition = 'none';
    reel.innerHTML = '';
    var frag = document.createDocumentFragment();
    reelNames.forEach(function(nm){ frag.appendChild(makeItem(nm)); });
    reel.appendChild(frag);
    reel.style.transform = 'translateY(0)';

    var finalY = -((winnerPos - centerRow) * ITEM_H);
    var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    void reel.offsetWidth; // reflow
    reel.style.transition = reduceMotion ? 'transform .6s ease-out' : 'transform 4.2s cubic-bezier(.12,.72,.15,1)';
    reel.style.transform = 'translateY(' + finalY + 'px)';

    var handled = false;
    function onDone(){
      if(handled) return;
      handled = true;
      reel.removeEventListener('transitionend', onDone);
      var band = $('slot-center');
      band.classList.remove('pulse'); void band.offsetWidth; band.classList.add('pulse');
      // 풀에서 제거 + 기록
      names.splice(winnerIndex,1);
      winners.push(winner);
      spinning = false;
      $('spin-btn').disabled = false;
      setTimeout(function(){ showOverlay(winner); }, 520);
    }
    reel.addEventListener('transitionend', onDone);
    setTimeout(onDone, reduceMotion ? 800 : 4500);
  });

  var overlay = $('overlay');
  function showOverlay(winnerName){
    $('winner-name').textContent = winnerName;
    overlay.style.display = 'flex';
    spawnConfetti();
  }
  function hideOverlay(){ overlay.style.display='none'; $('confetti-layer').innerHTML=''; }

  $('next-winner-btn').addEventListener('click', function(){ hideOverlay(); refreshDrawScreen(); });

  function spawnConfetti(){
    var layer = $('confetti-layer'); layer.innerHTML='';
    var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var count = reduceMotion ? 0 : 60;
    for(var i=0;i<count;i++){
      var dot = document.createElement('i');
      var size = 5 + Math.random()*10;
      dot.style.width=size+'px'; dot.style.height=size+'px';
      dot.style.left=(Math.random()*100)+'%';
      dot.style.background=PALETTE[i % PALETTE.length];
      dot.style.animationDuration=(2.2 + Math.random()*1.6)+'s';
      dot.style.animationDelay=(Math.random()*0.5)+'s';
      layer.appendChild(dot);
      (function(el){ setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 4500); })(dot);
    }
  }

  renderChips();
})();
</script>
</body>
</html>
